# ==========================================
# Supabase - Session Pooler (IPv4 compatible)
# ==========================================
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
# Change to "validate" or "none" in production to prevent unintended table drops/updates
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================
# Security / CORS Configuration
# ==========================================
# For production, set to your frontend domain (e.g., https://myfrontend.com)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# ==========================================
# Server Configuration
# ==========================================
server.port=${SERVER_PORT:9090}

# Supabase Storage (images). Create a public bucket with the same name, or change bucket below.
# Use the service role key from Supabase Dashboard > Project Settings > API (server only — never expose in a client).
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB
supabase.storage.project-url=${SUPABASE_PROJECT_URL:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:sponsors}
supabase.storage.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}