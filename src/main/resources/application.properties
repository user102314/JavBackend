spring.datasource.url=jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.kdxswrwcinikvmaquolv
spring.datasource.password=Oussamaoussam
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================
# Server Configuration
# ==========================================
server.port=9090

# Supabase Storage (images). Create a public bucket with the same name, or change bucket below.
# Use the service role key from Supabase Dashboard > Project Settings > API (server only — never expose in a client).
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB
supabase.storage.project-url=https://kdxswrwcinikvmaquolv.supabase.co
supabase.storage.bucket=sponsors
supabase.storage.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}